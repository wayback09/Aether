<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modrinth Browser</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="header">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Search Modrinth for mods, modpacks..." autocomplete="off" />
    </div>
  </div>

  <div id="resultsContainer">
    <div class="placeholder-wrap">
      <div class="placeholder-icon">🔍</div>
      <p>Search for mods above</p>
    </div>
  </div>

  <!-- Install Modal -->
  <div id="installModal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <div id="modalModIcon" class="modal-mod-icon"></div>
        <div>
          <h3 id="modalModName">Mod Name</h3>
          <p id="modalModAuthor" class="modal-mod-author"></p>
        </div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>

      <div class="modal-section">
        <label class="modal-label">Version</label>
        <div class="select-wrap">
          <select id="versionSelect"><option>Loading versions...</option></select>
        </div>
      </div>

      <div class="modal-section">
        <label class="modal-label">Target Instance</label>
        <div class="select-wrap">
          <select id="instanceSelect"><option>Loading instances...</option></select>
        </div>
      </div>

      <div id="installStatus" class="install-status hidden"></div>

      <div class="modal-actions">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-install" id="installBtn">
          <span id="installBtnText">Install</span>
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
